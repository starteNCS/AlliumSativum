syntax = "proto3";
import "models.proto";

option csharp_namespace = "AlliumSativum.Worker";

service Planner {
  rpc Plan (GSelectBaseModel) returns (GPlanResponse);
}

message GPlanResponse {
  bool success = 1;
  repeated GPlanContainer plans = 2;
  optional GSelectBaseModel unplanned = 3;
}

message GPlanContainer {
  GPlanOperator plan = 1;
  GSelectBaseModel planned = 2;
}