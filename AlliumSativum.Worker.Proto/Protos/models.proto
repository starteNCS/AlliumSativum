syntax = "proto3";
import "google/protobuf/struct.proto";

option csharp_namespace = "AlliumSativum.Worker";

message Void {}

// Prefix all models with G to distinct between those and the c# models

// SelectBaseModel
message GSelectBaseModel {
  GTableSpecifier from = 1;
  repeated GAttributeSpecifier select = 2;
  GExpressionNode where = 3;
  repeated GJoinBaseModel joins = 4;
}

message GTableSpecifier {
  string dataSource = 1;
  string tableName = 2;
}

message GAttributeSpecifier {
  GTableSpecifier table = 1;
  string attributeName = 2;
  bool IsHidden = 3;
}

message GJoinBaseModel {
  GTableSpecifier inner = 1;
  GExpressionNode expression = 2;
}

message GExpressionNode {
  oneof node_type {
    GVariableMappingNode variable_mapping = 1;
    GFullySpecifiedColumnNode fully_specified = 2;
    GValueNode value = 3;
    GBinaryOperatorNode binary_operator = 4;
  }
}

message GVariableMappingNode {
  string alias_name = 1;
  string attribute_name = 4;
}

message GFullySpecifiedColumnNode {
  string data_source_name = 1;
  string table_name = 2;
  string attribute_name = 3;
}

message GValueNode {
  string value = 1;
}

message GBinaryOperatorNode {
  string operation = 1;
  GExpressionNode left = 2;
  GExpressionNode right = 3;
}

// QueryExecutionPlan
message GQueryExecutionPlan {
  double cost = 1;
  GPlanOperator root_operator = 2;
}

message GPlanOperator {
  double cost = 1;
  int64 expectedCardinality = 2;
  oneof operator_type {
    GPushdownSqlPlanOperator pushdown_sql = 3;
    GPushdownRestCallPlanOperator pushdown_rest_call = 4;
  }
}

message GPushdownSqlPlanOperator {
  string datasourceId = 1;
  string sql_statement = 2;
  GTableSpecifier self = 3;
}

message GPushdownRestCallPlanOperator {
  string datasourceId = 1;
  string httpMethod = 2;
  string url = 3;
  GTableSpecifier self = 4;
}

// Executor
message GExecutorWrapper {
  GPlanOperator planOperator = 1;
  repeated google.protobuf.Struct result = 2;
  int64 factualCardinality = 3;
  double factualCost = 4;
}