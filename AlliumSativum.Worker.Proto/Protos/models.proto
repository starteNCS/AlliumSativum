syntax = "proto3";

option csharp_namespace = "AlliumSativum.Worker";

message Void {}

// Prefix all models with G to distinct between those and the c# models

// SelectBaseModel
message GSelectBaseModel {
  GTableSpecifier from = 1;
  repeated GAttributeSpecifier select = 2;
}

message GTableSpecifier {
  string dataSource = 1;
  string tableName = 2;
}

message GAttributeSpecifier {
  GTableSpecifier table = 1;
  string attributeName = 2;
}

// QueryExecutionPlan
message GQueryExecutionPlan {
  double cost = 1;
  GPlanOperator root_operator = 2;
}

message GPlanOperator {
  oneof operator_type {
    GPushdownSqlPlanOperator pushdown_sql = 1;
  }
}

message GPushdownSqlPlanOperator {
  string sql_statement = 1;
  string datasourceId = 2;
}